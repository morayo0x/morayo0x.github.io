# .github/workflows/deploy.yml
# Deploys to GitHub Pages on every push to main.
#
# Setup:
# 1. Go to your repo Settings → Pages
# 2. Set Source to "GitHub Actions"
# 3. Push to main — first deploy will run automatically

name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  # Allow manual trigger from Actions tab
  workflow_dispatch:

# Required permissions for Pages deployment
permissions:
  contents: read
  pages: write
  id-token: write

# Only one deployment at a time; don't cancel in-progress
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  # ─── Build ──────────────────────────────────────────────────────────────
  build:
    name: Build site
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Fetch full history for git-based features (optional)
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v4

      - name: Install dependencies
        run: npm ci

      - name: Build Astro site
        run: npm run build
        env:
          # Passed through to Astro for environment-specific behavior
          NODE_ENV: production

      - name: Run Pagefind (search index)
        run: npx pagefind --site dist
        # This generates dist/pagefind/ — the search index served as static files

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  # ─── Deploy ─────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
